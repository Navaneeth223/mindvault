version: "3.9"

# ─── Shared environment for all backend services ───────────────────────────────
x-backend-env: &backend-env
  env_file: .env
  environment:
    - DJANGO_SETTINGS_MODULE=config.settings.development

# ─── Shared backend build context ──────────────────────────────────────────────
x-backend-build: &backend-build
  build:
    context: .
    dockerfile: Dockerfile.backend
  volumes:
    - .:/app
    - media_data:/app/media
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  # ── PostgreSQL Database ───────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mindvault
      POSTGRES_USER: mindvault
      POSTGRES_PASSWORD: mindvault_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindvault -d mindvault"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis (Celery broker + result backend) ────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Django Backend (Gunicorn) ─────────────────────────────────────────────────
  backend:
    <<: [*backend-build, *backend-env]
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn config.wsgi:application
               --bind 0.0.0.0:8000
               --workers 4
               --worker-class gthread
               --threads 2
               --timeout 120
               --access-logfile -
               --error-logfile -"
    ports:
      - "8000:8000"
    expose:
      - "8000"

  # ── Celery Worker (async tasks: scraping, transcription, thumbnails) ──────────
  celery:
    <<: [*backend-build, *backend-env]
    restart: unless-stopped
    command: celery -A config worker -l info -Q default,media -c 4
    depends_on:
      - backend
      - redis

  # ── Celery Beat (scheduled tasks: reminder checks) ───────────────────────────
  celery-beat:
    <<: [*backend-build, *backend-env]
    restart: unless-stopped
    command: >
      celery -A config beat -l info
        --scheduler django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      - backend
      - redis

  # ── React Frontend (Vite dev server in development) ──────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

  # ── Nginx Reverse Proxy (production-style routing) ───────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - media_data:/app/media:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
  media_data:
