version: '3.9'

# ─── Local Docker Setup ────────────────────────────────────────────────────────
# Usage:  docker-compose -f docker-compose.local.yml up
# Or:     make start
#
# Access backend:  http://localhost:8000
# Access frontend: http://localhost:3000
# API health:      http://localhost:8000/api/health/
#
# For mobile app: run `make local-ip` to get your PC's IP address
# Then in mobile Settings → Server URL → http://YOUR_IP:8000

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --no-input &&
             gunicorn config.wsgi:application
             --bind 0.0.0.0:8000 --workers 2 --timeout 60 --reload"
    ports:
      - "8000:8000"
    volumes:
      - ./media:/app/media
      - ./db.sqlite3:/app/db.sqlite3
      - .:/app
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.local
      - DEBUG=True
      - SECRET_KEY=${SECRET_KEY:-local-dev-secret-mindvault-2024}
      - DATABASE_URL=sqlite:////app/db.sqlite3
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0,*
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173,http://localhost:8081
      - MEDIA_ROOT=/app/media
      - MEDIA_URL=/media/
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3

  celery:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: celery -A config worker -l warning -Q default,media -c 2
    volumes:
      - ./media:/app/media
      - ./db.sqlite3:/app/db.sqlite3
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.local
      - DATABASE_URL=sqlite:////app/db.sqlite3
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-local-dev-secret-mindvault-2024}
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
