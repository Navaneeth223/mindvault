services:
  - type: web
    name: mindvault-api
    runtime: python
    plan: free  # Specify plan explicitly
    region: oregon  # Choose your preferred region
    buildCommand: "export DJANGO_SETTINGS_MODULE=config.settings.build && pip install -r requirements.txt"
    preDeployCommand: "python manage.py collectstatic --no-input && python manage.py migrate --noinput"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: mindvault-db
          property: connectionString
      - key: ALLOWED_HOSTS
        sync: false  # We'll set this manually after deployment
      - key: CORS_ALLOWED_ORIGINS
        value: https://mindvault-pearl.vercel.app
      - key: WHISPER_MODEL
        value: tiny
      - key: PYTHON_VERSION
        value: "3.11.9"

databases:
  - name: mindvault-db
    databaseName: mindvault
    user: mindvault
    plan: free  # Free tier PostgreSQL
    region: oregon  # Same region as web service
