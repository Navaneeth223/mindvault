services:
  - type: web
    name: mindvault-api
    runtime: python
    # rootDir is intentionally omitted — repo root IS the Django project
    # (manage.py and requirements.txt are at the repo root)
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: mindvault-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: mindvault-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://mindvault-pearl.vercel.app
      - key: WHISPER_MODEL
        value: tiny
    healthCheckPath: /api/auth/login/

databases:
  - name: mindvault-db
    plan: free
